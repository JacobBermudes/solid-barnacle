name: Deploy SpeedBall Daemon

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build Go binary
        run: |
          go mod tidy
          export CGO_ENABLED=0
          export GOOS=linux 
          export GOARCH=amd64
          go build -o surfboost_api_v1 ./cmd/api && go build -o surfboostd_v1 ./cmd/bot
          echo "Build completed."

      - name: Copy API binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "surfboost_api_v1, surfboostd_v1"
          target: "/etc/speedball"

      - name: Restart service on VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo systemctl stop surfboostd_v1 || true
            sudo systemctl stop surfboost_api_v1 || true
            chmod +x /etc/surfboost_v1/surfboost_api_v1
            chmod +x /etc/surfboost_v1/surfboostd_v1
            sudo systemctl start surfboostd_v1
            sudo systemctl start surfboost_api_v1
